version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aicontent
      POSTGRES_USER: aicontent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aicontent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI + Celery) ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database locale PostgreSQL (non Supabase per DB queries)
      DATABASE_URL: postgresql+asyncpg://aicontent:${DB_PASSWORD:-changeme}@postgres:5432/aicontent
      REDIS_URL: redis://redis:6379/0
      # Supabase solo per Storage (asset upload/download)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:-endxgujdxrzssccfikql}
      # NON settare SUPABASE_ACCESS_TOKEN — usiamo PostgreSQL diretto
      SUPABASE_ACCESS_TOKEN: ""
      # Altri
      HF_API_TOKEN: ${HF_API_TOKEN}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ai-content-studio-lac.vercel.app,http://localhost:3000}
      ENVIRONMENT: production
    volumes:
      - backend_output:/app/output
    ports:
      - "8000:8000"
    command: >
      sh -c "python -c 'import asyncio; from app.database import init_db; asyncio.run(init_db())' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

  # ── Celery Worker ───────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aicontent:${DB_PASSWORD:-changeme}@postgres:5432/aicontent
      REDIS_URL: redis://redis:6379/0
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:-endxgujdxrzssccfikql}
      SUPABASE_ACCESS_TOKEN: ""
      HF_API_TOKEN: ${HF_API_TOKEN}
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production}
      ENVIRONMENT: production
    volumes:
      - backend_output:/app/output
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  # ── Nginx (reverse proxy + SSL) ─────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot
    depends_on:
      - backend

  # ── Certbot (SSL auto-rinnovo) ──────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  backend_output:
  certbot_data:
