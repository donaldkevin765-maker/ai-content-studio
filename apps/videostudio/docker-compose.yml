services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file: .env
    volumes:
      - ./app:/app/app
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  beat:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app beat --loglevel=info

  flower:
    build: .
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_started
    command: celery -A app.workers.celery_app flower --port=5555

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
