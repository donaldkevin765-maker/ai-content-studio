name: Compile Video 4K

on:
  repository_dispatch:
    types: [compile_video]

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install httpx Pillow srt

      - name: Download assets from Supabase
        run: |
          mkdir -p assets/input assets/output
          python3 -c "
import httpx, json, sys, os

SUPABASE_URL = '${{ inputs.supabase_url }}'
SUPABASE_KEY = '${{ inputs.supabase_key }}'
BUCKET = 'videos'
VIDEO_ID = ${{ inputs.video_id }}

client = httpx.Client(timeout=60.0)
headers = {'Authorization': f'Bearer {SUPABASE_KEY}', 'apikey': SUPABASE_KEY}

# Scarica info video
resp = client.get(f'{SUPABASE_URL}/rest/v1/videos?id=eq.{VIDEO_ID}', headers=headers)
resp.raise_for_status()
video = resp.json()[0]
scene_count = 0

# Scarica scene
resp = client.get(f'{SUPABASE_URL}/rest/v1/scenes?video_id=eq.{VIDEO_ID}&order=order.asc', headers=headers)
if resp.status_code == 200:
    scenes = resp.json()
    scene_count = len(scenes)
    print(f'Scene trovate: {scene_count}')
else:
    scenes = []
    print('Nessuna scena trovata, si usa solo l\\'audio')

# Scarica asset
for i in range(20):
    for ext in ['mp3', 'png']:
        fname = f'audio_{i}.mp3' if ext == 'mp3' else f'image_{i}.png'
        url = f'{SUPABASE_URL}/storage/v1/object/public/{BUCKET}/assets/{VIDEO_ID}/{fname}'
        r = client.get(url)
        if r.status_code == 200:
            with open(f'assets/input/{fname}', 'wb') as f:
                f.write(r.content)
            print(f'  Scaricato: {fname}')

# Scarica sottotitoli
r = client.get(f'{SUPABASE_URL}/storage/v1/object/public/{BUCKET}/assets/{VIDEO_ID}/subtitles.srt')
if r.status_code == 200:
    with open('assets/input/subtitles.srt', 'wb') as f:
        f.write(r.content)
    print('  Scaricato: subtitles.srt')

client.close()
print(f'\\nDownload completato per video {VIDEO_ID}')
"

      - name: Compile 4K Master (with 5.1 audio)
        run: |
          python3 -c "
import subprocess, sys, os, glob, json

video_id = ${{ inputs.video_id }}
input_dir = 'assets/input'
output_dir = 'assets/output'
os.makedirs(output_dir, exist_ok=True)

ffmpeg = 'ffmpeg'

# Raccogli scene
audio_files = sorted(glob.glob(f'{input_dir}/audio_*.mp3'))
image_files = sorted(glob.glob(f'{input_dir}/image_*.png'))
srt_file = f'{input_dir}/subtitles.srt'
subtitle_filter = ''

if not audio_files:
    print('Nessun asset trovato!')
    sys.exit(1)

n_scenes = len(audio_files)
print(f'Scene da compilare: {n_scenes}')

# Step 1: Compila video intermedio con voice-only (nessuna musica, usarâ il 5.1 dalla pipeline di mix)
# Per ogni scena: concatena immagine + audio, poi join
concat_file = f'{input_dir}/concat.txt'
with open(concat_file, 'w') as f:
    for i, (img, aud) in enumerate(zip(image_files, audio_files)):
        # Ottieni durata audio
        dur_cmd = [ffmpeg, '-i', aud, '-f', 'null', '-']
        dur_proc = subprocess.run(dur_cmd, capture_output=True, text=True)
        # ffmpeg non ha un semplice 'get duration', usiamo probe
        probe = subprocess.run(
            [ffmpeg, '-i', aud, '-show_entries', 'format=duration', '-v', 'quiet', '-of', 'csv=p=0'],
            capture_output=True, text=True
        )
        try:
            dur = float(probe.stdout.strip())
        except:
            dur = 10.0
        f.write(f\"file '{os.path.abspath(img)}'\\n\")
        f.write(f'duration {dur}\\n')
    # Ultimo frame per la durata
    f.write(f\"file '{os.path.abspath(image_files[-1])}'\\n\")

# Step 2: Compila master video senza audio (solo immagini)
master_no_audio = f'{output_dir}/master_novideo.mp4'
cmd_master = [
    ffmpeg, '-y',
    '-f', 'concat',
    '-safe', '0',
    '-i', concat_file,
    '-c:v', 'libx264',
    '-preset', 'slow',
    '-crf', '18',
    '-r', '24',
    '-pix_fmt', 'yuv420p',
    '-vf', 'scale=3840:2160:flags=lanczos',
    master_no_audio,
]
print(f'Compilazione master 4K...')
subprocess.run(cmd_master, check=True)

# Step 3: Mix audio 5.1
# Crea un unico file audio concatenando tutte le scene
audio_concat = f'{input_dir}/audio_concat.txt'
with open(audio_concat, 'w') as f:
    for aud in audio_files:
        f.write(f\"file '{os.path.abspath(aud)}'\\n\")

voice_mix = f'{output_dir}/voice_51.aac'
cmd_audio = [
    ffmpeg, '-y', '-f', 'concat', '-safe', '0', '-i', audio_concat,
    '-filter_complex',
    '[0:a]aformat=channel_layouts=mono,'
    'pan=5.1|FC=1.0,'
    'loudnorm=I=-14:LRA=7:TP=-2[aout]',
    '-map', '[aout]',
    '-c:a', 'aac',
    '-b:a', '384k',
    voice_mix,
]
print(f'Mix audio 5.1...')
subprocess.run(cmd_audio, check=True)

# Step 4: Merge video + audio
master_final = f'{output_dir}/master_4k.mp4'
cmd_merge = [
    ffmpeg, '-y',
    '-i', master_no_audio,
    '-i', voice_mix,
    '-c:v', 'copy',
    '-c:a', 'copy',
    '-shortest',
    master_final,
]
print(f'Merge video+audio...')
subprocess.run(cmd_merge, check=True)

# Step 5: Genera formati derivati
formats = [
    ('1080p', '-vf', 'scale=1920:1080:flags=lanczos', '-crf', '20'),
    ('story', '-vf', 'scale=1080:1920:flags=lanczos,setdar=9/16,setsar=1', '-crf', '20'),
    ('square', '-vf', 'scale=1080:1080:flags=lanczos,setdar=1/1,setsar=1', '-crf', '20'),
    # Stereo downmix per social
    ('stereo', None, '-crf', '20'),
]

for suffix, vf, crf in formats:
    out = f'{output_dir}/video_{video_id}_{suffix}.mp4'
    cmd = [ffmpeg, '-y', '-i', master_final]

    if suffix == 'stereo':
        # Downmix 5.1 → stereo con normalizzazione
        cmd += ['-af', 'pan=stereo|FL=FC+0.5*FL+0.5*BL|FR=FC+0.5*FR+0.5*BR,loudnorm=I=-14']
    elif vf:
        cmd += ['-vf', vf]

    cmd += ['-c:v', 'libx264', '-preset', 'medium', crf, '-pix_fmt', 'yuv420p']
    cmd += ['-c:a', 'aac', '-b:a', '192k', '-shortest', out]
    print(f'Formato {suffix}...')
    subprocess.run(cmd, check=True)

print('Compilazione completata!')
"

      - name: Upload to Supabase Storage
        run: |
          python3 -c "
import httpx, os

SUPABASE_URL = '${{ inputs.supabase_url }}'
SUPABASE_KEY = '${{ inputs.supabase_key }}'
BUCKET = 'videos'
VIDEO_ID = ${{ inputs.video_id }}

headers = {'Authorization': f'Bearer {SUPABASE_KEY}', 'apikey': SUPABASE_KEY}
client = httpx.Client(timeout=120.0)

# Upload video master
for fname in os.listdir('assets/output'):
    if fname.startswith('video_'):
        remote_path = f'videos/{fname}'
        with open(f'assets/output/{fname}', 'rb') as f:
            resp = client.post(
                f'{SUPABASE_URL}/storage/v1/object/{BUCKET}/{remote_path}',
                content=f.read(),
                headers={**headers, 'content-type': 'application/octet-stream'},
            )
        if resp.status_code in (200, 201):
            public_url = f'{SUPABASE_URL}/storage/v1/object/public/{BUCKET}/{remote_path}'
            print(f'Upload: {public_url}')
        else:
            print(f'Upload fallito {fname}: {resp.status_code}')

client.close()
"

      - name: Update video status
        run: |
          python3 -c "
import httpx

SUPABASE_URL = '${{ inputs.supabase_url }}'
SUPABASE_KEY = '${{ inputs.supabase_key }}'
VIDEO_ID = ${{ inputs.video_id }}

headers = {
    'Authorization': f'Bearer {SUPABASE_KEY}',
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal',
}

client = httpx.Client(timeout=30.0)

# Cerca tutti i formati uploadati
public = f'{SUPABASE_URL}/storage/v1/object/public/videos/videos'
master_url = f'{public}/video_{VIDEO_ID}_master_4k.mp4'

# Verifica se master è stato uploadato
r = client.head(master_url, headers=headers)
if r.status_code != 200:
    master_url = ''

client.patch(
    f'{SUPABASE_URL}/rest/v1/videos?id=eq.{VIDEO_ID}',
    headers=headers,
    json={
        'status': 'completed',
        'output_url': master_url,
        'progress_percent': 100.0,
        'progress_step': 'Completato (4K + formati social)',
    },
)
print(f'Video {VIDEO_ID} aggiornato a completed')
client.close()
"

      - name: Cleanup
        run: rm -rf assets/
